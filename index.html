<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern AI Style</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* พื้นหลังวงกลมเรืองแสง */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,255,255,0.4), transparent);
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
}

body::after {
    background: radial-gradient(circle, rgba(255,0,255,0.4), transparent);
    top: 60%;
    left: 60%;
    animation-delay: 3s;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
}

/* กล่องหลัก */
.card {
    position: relative;
    width: 380px;
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 40px rgba(0,255,255,0.3);
    text-align: center;
    color: white;
    z-index: 1;
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

.card h1 {
    font-size: 28px;
    margin-bottom: 15px;
    background: linear-gradient(to right, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card p {
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 25px;
}

/* ปุ่มสไตล์พรีเมียม */
.btn {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #00f2fe, #4facfe);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00f2fe;
}
</style>
</head>

<body>

<div class="card">
    <h1>AI Modern UI ✨</h1>
    <p>ดีไซน์แนว Glass + Glow + Gradient<br>ดูพรีเมียมแบบเว็บ AI รุ่นใหม่</p>
    <button class="btn">เริ่มต้นใช้งาน</button>
</div>

</body>
</html>
